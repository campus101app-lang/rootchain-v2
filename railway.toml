# Deploy API from monorepo root: https://docs.railway.app/guides/monorepo
[build]
builder = "nixpacks"
# install phase runs npm ci (see nixpacks.toml); build only compiles server
buildCommand = "npm run build --workspace=@rootchain/server"
watchPatterns = ["/server/**", "/packages/**", "/railway.toml", "/package.json", "/package-lock.json"]

[deploy]
startCommand = "npm run start:prod --workspace=@rootchain/server"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
